# GitLab CI/CD — Blue-Green Deployment with Kubernetes

stages:
  - build 
  - push 
  - deploy 

build:
  stage: build 
  script:
    - docker build 0t nephronix-web-app 


push:
  stage: push 
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD"
    - docker push nephronix-web-app 


deploy:
  stage: deploy 
  script:
    - kubectl apply -f kubernetes/blue-deployment.yaml
    - kubectl apply -f kunernets/green-deployment.yaml
    - kubectl rollout status kubernetes/blue-deployment
    - kubectl rollout status deployment/green-deployment