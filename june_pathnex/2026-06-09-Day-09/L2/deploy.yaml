#  Kubernetes — Horizontal Pod Autoscaler (HPA)

apiVersion: apps/v1
kind: apps/v1 
metadata:
  name: pathnex-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pathnex-app 
    template:
      metadata:
        labels: 
          app: pathnex-app 
      spec:
        containers:
          - name: nginx 
            image: nginx 
            ports:
              - containerPort: 80
---
  apiVersion: autoscaling/v2
  kind: HorizontalPodAutoscaler 
  metadata:
    name: pathnex-hpa 
  spec:
    scaleTargetRef:
      apiVersion: apps/v1 
      kind: Deployment 
      name: pathnex-deployment 
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 50
    