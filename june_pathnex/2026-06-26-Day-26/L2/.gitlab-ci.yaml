# GitLab CI/CD — Use GitLab Secrets for Secure Deployment

stages:
  - build
  - deploy 

build:
  stage: build 
  script:
    - docker build -t nephronix-web-app .

deploy:
  stage: deploy 
  script:
    - echo "Deploying with secure credentials"
    - aws ec2 run-instances --image-id ami-0abcd1234 --count 1 --instance-type t2.micro --access-key $AWS_ACCESS_KEY --secret-key $AWS_SECRET_KEY
