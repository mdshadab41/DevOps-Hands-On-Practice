apiVersion: apps/v1
kind: Deployment
metadata:
  name: nephronix-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nephronix-app
  template:
    metadata:
      labels: 
        app: nephronix-app 
    spec:
      containers:
        - name: app 
          image: nginx
          ports:
            - containersPort: 80