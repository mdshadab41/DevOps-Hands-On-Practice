# Kubernetes — RBAC Configuration for Access Control

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nephronix-cluster-admin
subjects:
  - kind: user 
    name: nephronix-user 
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole 
  name: cluster-admin 
  apiGroup: rbac.authorization.k8s.io

