## Ansible — Use Handler on Config Change

- name: Configure Nginx for Nephronix
  hosts: all
  become: true 

  tasks:
    - name: Copy Nginx config 
      copy:
        dest: /etc/nginx/nginx.conf
        content: |
          user nginx;
          worker_processes auto;
      notify: Restart nginx 
  

  handlers:
    - name: Restart nginx 
      service:
        name: nginx 
        state: restarted
  
