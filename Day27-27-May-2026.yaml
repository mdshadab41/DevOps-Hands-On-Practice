# Day 25 — Lineinfile, Key Pair, Multi-Container, File Count

## 🔹 Ansible — Modify Existing Line

---
 - name: Update SSH config for Pathnex
   hosts: all
   become: yes


   tasks:
    - name: Disable root login
      Lineinfile:
       path: /etc/ssh/sshd_config
       regexp: "^PermitRootLogin"
       line: "PermitRootLogin no"

## 🔹 Terraform — EC2 Key Pair Output

reosurce "aws_key_pair" PathnexKey {
key_name = "PathnexKey"
public_key = file("~/.sshd/id_rsa.pub")

}
output "Pathnex_key_Name" {
value = aws_key_pair.PathnexKey.key_name
}



## 🔹 Kubernetes — Multi-Container Pod (Sidecar Logging)

apiVersion: v1
kind: Pod
metadata:
  name: pathnex-Sidecar
  spce:
   containers:
    - name: app
      image: nginx
    - name: log-writer
      image: busybox
      command: ["sh", "-c", "while true; do echo log entry; sleep 5; done"]

## 🔹 Shell Script — Count Files in Directory
#!/bin/bash

DIR="/var/log"

COUNT=$(ls $DIR | wc -l)

echo "Total files in $DIR: $COUNT"



## 🔹 Jenkins Pipeline — Cache Dependencies
Pipeline {
agent any
environment {
INSTITUTE_NAME = "Pathnex"
TEAM = "DevOps"
ENV = "staging"
}
stages {
stage('Checkout'){
steps {
  git url: 'https://github.com/Pathnex/sample-java-app.git'
}}
stage('Build'){
steps {
sh ```
 if [ -d ".m2" ]; then
   echo "Using cached dependencies for $INSTITUE_NAME in $ENV by $TEAM"
   else 
    mvn clean compile
  fi
  ...
}}

}
}



## 🔹 GitLab CI — Cache Dependencies

stages: 
 - build


variables:
  INSTITUE_NAME: "Pathnex"
  TEAM: "DevOps"
  ENV: "staging"

  build:
   stage: build
   image: maven:3.8.1-jdk-17
   cache:
    key: "${ENV}-maven-cache"
    paths:
     - .m2/repository
  script:
   - mvn clean compile
   - echo "Cached dependencies for $INSTITUE_NAME in $ENV by $TEAM"