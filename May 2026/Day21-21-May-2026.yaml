## 3. Kubernetes

apiVersion: app/v1
kind: Deployment
metadata:
 name: nginx-Deployment
spec:
 replicas: 3

 selector:
   matchLabels:
     app: nginx


  template:
    metadata:
     labels:
      app: nginx
  spec:
  containers:
   - name: nginx
    image: nginx
    ports:
     - containerPort: 80
  



