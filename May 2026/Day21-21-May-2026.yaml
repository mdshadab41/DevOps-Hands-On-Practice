   ## 5.  Jenkins Pipeline — Deploy to Multiple Environments

   pipeline {
   agent any
   environment {
   INSTITUTE_NAME = "Pathnex"
   }
   stages {
   stage('Deploy to Dev'){
   steps {
   sh 'echo "Deploying $INSTITUTE_NAME to Dev environment"'
   }
   }
   stage('Deploy to Staging') {
   steps {
   input message: "Approve Staging Deployment"
   sh 'echo "Deplying $INSTITUTE_NAME to Staging environemnt'
   }
   stage('Deploy to Prod'){
   
   steps {
   input message: "Approve Prod Deployemnt?"
   sh 'echo "Deploying $INSTITUTE_NAME to Prod environment"'
   
   }
   
   }

## 6. Gitlab CI - Multienvironment

stages:
 - Deploy


 variables:
  INSTITUTE_NAME: "Pathnex"

  deploy-dev:
   stage: deploy
   image: alpine: latest
   script:
    - echo "Deplying $INSTITUTE_NAME to Dev environemnt"

  deploy-staging:
    stage: deploy
    image: alpine:latest
    script:
     - echo "Deploying $INSTITUTE_NAME to Staging environemnt"
    when: manual


    deploy-prod:
