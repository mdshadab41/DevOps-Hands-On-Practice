# Day 21 — SPEED TYPING (LEVEL 2)


## 1. Ansible

---
 - name: Install and configure nginx
   hosts: all
   become: yes

   tasks:
    - name: Install nginx
      yum:
       name: nginx
       state: present
    - name: Start and enable nginx service
      service:
       name: nginx
       enabled: yes

