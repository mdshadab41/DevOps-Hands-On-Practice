## Kubernetes

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pathnex-pvc
spec:
  accessModes:
   - ReadWriteOnce
  resources:
   requests:
    storage: 1Gi

---
apiVersion: apps/v1
kind: deployment
metadata:
  name: nginx-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      apps: nginx

  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx

          volumeMounts:
            - mountPath: /data
              name: storage

          volumes: 
           - name: storage
             PersistentVolumeClaim:
               claimName: pathnex-pvc


---
apiVersion: v1 
kind: Service
metadata:
  name: nginx-nodepart

spec: 
  type: NodePort

  selector:
    app: nginx


  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080