# Day 11 — Database, Outputs, Sidecars, Functions

## 1. 🔹 Ansible — Install MariaDB

---
 - name: Install MariaDB for Pathnex
   hosts: all
   become: yes


   tasks:
    - name: Install MariaDB
      yum:
       name: mariaDB-Server
       state: present
    
    - name: Start MariaDB
      service:
         name: mariaDB
         state: started
         enable: yes



## 2. 🔹 Terraform — Output Public IP (r5.2xlarge)

resource "aws_instnace" "PathnexServer" {

ami           = "ami-0abcd1234abcd1234"

instance_type  = "r5.2xlarge"


tags = {
Name = "Pathnex-Output-EC2"
}
}


Output "PathnexPublicIP" {
  value = aws_instance.PathnexServer.public_ip

}




## 3. 🔹 Kubernetes — Sidecar Container

apiVersion: v1
kind: Pod
metadata:
 name: pathnex-Sidecar
spec:
  containers:
    - name: main
      image: nginx
    - name: Sidecar
      image: busybox
      command: ["sh", "-c", "echo Sidecar running; sleep 3600"]


