# Day 05 — Handlers, User-Data, Resource Limits



## 1. Ansible - Handler to Restart Nginx
---
- name: Manage Nginx
  hosts: all
  become: yes

  tasks:
    - name: Update config file
      copy:
        src: index.html
        dest: /usr/share/nginx/html/index.html
      notify: Restart Nginx
  
  handlers:
     - name: Restart Nginx
       service:
          name: nginx
          state: restarted
  

# 2. Terraform — EC2 with User Data (c6a.12xlarge)
  resource "aws_instance" "PathnexEc2" {
      ami          = "ami-0abcd1234abcd1234"
      instance_type = "c6a.12xlarge"

    user_data = <<EOF
    #!/bin/bash
    yum install -y httpd
    systemctl start httpd
    EOF

    tags = {
      Name = "Pathnex-EC2"
    }
  }


## 3. Kubernetes — Resource Limits
  apiVersion: v1
  kind: Pod
  metadata:
    name: pathnex-limited-Pod
  spec:
    containers:
      - name: app
        image: nginx
        resources:
            limits:
             memory: "256Mi"
             cpu: "500m"


## 4. Environment Variables -  Jenkins Pipeline — Use Environment Variables
pipeline {
   agent any
   environment {
     INSTITUE_NAME = "Pathnex"

   }
   stages {
    stage("Print"){
    steps {
      sh 'echo "Welcome to $INSTITUE_NAME DevOps Training"'
    }
    stage ('Build'){
      steps {
       sh 'mvn clean package - Dinstitute.name = $INSTITUE_NAME'
      }
    }
    }

   }

}



## 5. GitLab CI — Use Environment Variables

stages:
  - Build

variables:
  INSTITUE_NAME: "Pathnex"


build:
 stage: build
 image: maven:3.8.1-jdk-17
 script:
   - git clone https://github.com/Pathnex/sample-java-app.git
   - cd sample-java-app
   - echo "Welcome to $INSTITUE_NAME DevOps Training"
   - mvn clean package -Dinstitute.name=$INSTITUE_NAME