# Day 14 — MINI PROJECT

## 1️⃣ Terraform — Create EC2 (any instance type)

- VPC
- Subnet
- Route table
- Internet gateway
- EC2 (c5.xlarge / r5.2xlarge / r6i.4xlarge / c6i.8xlarge / c6a.12xlarge)

provider "aws"  {

  region = "us-east-1"
}


##  VPC

resource "aws_vpc" "PathnexVPC" {
  cidr_block = "10.10.0.0/16"

  tags = {
    Name: "Pathnex - VPC"
  }
}


## subnet

resource "aws_subnet" "PathnexSubnet"  {
 vpc_id     = aws_vpc.PathnexVPC.id
 cidr_block = "10.10.1.0/24"
 map_public_ip_on_launch = true


 tags = {
   Name = "Pathnex - subnet"
 }
}


## Internet Gateway

resource "aws_internet_gateway" "PathnexIGW" {
  vpc_id = aws_vpc.PathnexVPC.id

  tags = {
    Name = "Pathnex-IGW"
  }
}

## Route Table 

resource "aws_route_table" "PathnexRT" {
  vpc_id = aws_vpc.PathnexVPC.id

  route {
    cidr_block = "0.0.0.0/0"
    gateway_id = aws_internet_gateway.PathnexIGW.id
  }

  tags = {
    Name = "Pathnex-RT"
  }
}


## Route Table Association

resource "aws_route_table_association" "PathnexRTA" {
  subnet_id      = aws_subnet.PathnexSubnet.id
  route_table_id = aws_route_table.PathnexRT.id
}



## # Security Group

resource "aws_security_group" "PathnexSG" {
  name   = "PathnexSG"
  vpc_id = aws_vpc.PathnexVPC.id

  ingress {
    from_port   = 22
    to_port     = 22
    protocol    = "tcp"
    cidr_blocks = ["0.0.0.0/0"]
  }

  ingress {
    from_port   = 80
    to_port     = 80
    protocol    = "tcp"
    cidr_blocks = ["0.0.0.0/0"]
  }

egress {
    from_port   = 0
    to_port     = 0
    protocol    = "-1"
    cidr_blocks = ["0.0.0.0/0"]
  }

  tags = {
    Name = "Pathnex-SG"
  }
}


## EC2

resource "aws_instance" "PathnexEC2" {

  ami                    = "ami-0abcd1234abcd1234"

  instance_type          = "c5.xlarge"
  # instance_type        = "r5.2xlarge"
  # instance_type        = "r6i.4xlarge"
  # instance_type        = "c6i.8xlarge"
  # instance_type        = "c6a.12xlarge"

  subnet_id              = aws_subnet.PathnexSubnet.id
  vpc_security_group_ids = [aws_security_group.PathnexSG.id]

  tags = {
    Name = "Pathnex-EC2"
  }
}

## 2️⃣ Ansible — Install Nginx & Deploy HTML File
---
- name: Install Nginx and Deploy HTML File
  hosts: all
  become: yes

  tasks:

    - name: Install nginx
      yum:
        name: nginx
        state: present

    - name: Start and enable nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Deploy HTML file
      copy:
        src: index.html
        dest: /usr/share/nginx/html/index.html

    - name: Restart nginx
      service:
        name: nginx
        state: restarted

## 3️⃣ Kubernetes — Create Deployment + Service

apiVersion: apps/v1
kind: Deployment

metadata:
  name: pathnex-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: pathnex-app

  template:
    metadata:
      labels:
        app: pathnex-app

    spec:
      containers:
        - name: nginx-container
          image: nginx

          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service

metadata:
  name: pathnex-service

spec:
  selector:
    app: pathnex-app

  ports:
    - port: 80
      targetPort: 80

  type: ClusterIP

