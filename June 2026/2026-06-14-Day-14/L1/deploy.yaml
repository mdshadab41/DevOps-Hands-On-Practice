apiVersion: apps/v1
kind: Deployment
metadata:
  name: nephronix-deployment

spec:
  replicas: 2
  selector:
    matchLabels:
      app: nephronix-app 
    template:
      metadata:
        labels: 
          app: nephronix-app 
      spec:
        containers:
          - name: app 
            image: nginx 
            ports:
              - containerPort: 80