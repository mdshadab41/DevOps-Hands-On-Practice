stages:
  - build
  - push
  - deploy

build:
  stage: build
  script:
    - docker build -t nephronix-web-app
push:
  stage: push 
  script: 
    - docker  login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD"
    - docker push nephronix-web-app 
deploy:
  stage: deploy 
  script:
    - helm repo add stable  https://charts.helm.sh/stable
    - helm install nephronix nginx stable/nginx-ingress