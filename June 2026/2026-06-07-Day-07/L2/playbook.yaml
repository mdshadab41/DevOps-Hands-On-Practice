# 🔹 Ansible — Setup Nginx with Custom Config
 - name: Setup Nginx with Custome Config 
   hosts: all 
   become: true 
   tasks:
     - name: Install nginx 
       yum:
         name: nginx 
         state: present 

     - name: Copy custome nginx.conf 
       copy:
         src: nginx.conf 
         dest: /etc.nginx/nginx.conf 

     - name: Start nginx services
       services:
         name: nginx 
         state: started 
         enabled: yes
         