apiVersion: apps/v1
kind: Pod


metadata:
  name: pathnex-deployment
  labels:
    app: pathnex 

  spec:
    replicas: 2
    
    selector:
      matchLabels:
        app: pathnex
    
    spec: 
      containers:
        - name: app 
          image: nginx:1.25
          ports:
            - containersPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "250m"
            limits:
              memory: "128Mi"
              cpu: "500m"
