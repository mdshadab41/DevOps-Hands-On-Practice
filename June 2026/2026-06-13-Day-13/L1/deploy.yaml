apiVersion: apps/v1
kind: Deployment 
metadata:
  name: broken
spec:
  replicas: 2
  selector:
    matchLabels:
      app: broken 
  template:
    metadata: 
      labels: 
        app: broken 
    spec:
      containers:
        - name: app 
          image: nginx

---
  apiVersion: apps/v1 
  kind: Deployment
  metadata:
    name: pathnex-deployment
  spec:
    replicas: 3
    selector:
      matchLabels:
        app: pathnex 
    template:
      metadata:
        labels:
          app: pathnex 
      spec:
        containers:
         - name: web 
           image: nginx:1.25