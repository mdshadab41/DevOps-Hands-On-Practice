## 🔹 Jenkins Pipeline — Deploy to Dynamic Environment

Pipeline {
agent any

emvironment {
INSTITUTE_NAME = "Pathnex"
TEAM = "DevOps"
}
parameters {
string(name; 'ENVIRONMENT', defaultValue: 'dev', description: 'Deployment Environment')
}
stages {
stage('Deploy'){
steps {
sh 'echo "Deploying $INSTITUTE_NAME app to $ENVIRONMENT for $TEAM team"'
}
}
}

}

## 🔹 GitLab CI — Dynamic Environment Deployment

stages:
 - deploy

variables:
  INSTITUTE_NAME: "Pathnex"
  TEAM: "DevOps"

  deploy:
   stage: deploy
   image: alpine:latest
   environment:
    name: $CI_COMMIT_REF_NAME
    url: http:/$CI_COMMIT_REF_NAME.pathnex.com
    script:
     - echo "Deploying $INSTITUE_NAME" app to $CI_COMMIT_REF_NAME for $TEAM team





















